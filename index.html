<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtomeFacile - Laboratoire Interactif</title>
    <!-- Chargement de Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement de React et Babel pour faire fonctionner le code dans le navigateur -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icônes Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Composant Icône simplifié pour le déploiement sans imports
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('concept');
            const [nConcept, setNConcept] = useState(1);
            const [conceptLevel, setConceptLevel] = useState(1);
            const [speedF1, setSpeedF1] = useState(50);
            const [radiusN, setRadiusN] = useState(1);
            const [energyN, setEnergyN] = useState(1);

            const layerNames = ['K', 'L', 'M', 'N', 'O'];

            const getOrbitStatus = () => {
                if (speedF1 < 45) return 'crash';
                if (speedF1 > 55) return 'fly';
                return 'stable';
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* NAVBAR */}
                    <nav className="bg-slate-900 text-white sticky top-0 z-50 shadow-xl border-b border-slate-700">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="flex flex-col sm:flex-row justify-between items-center py-4 gap-4">
                                <div className="flex items-center gap-3 font-extrabold text-2xl text-blue-400">
                                    <Icon name="shapes" size={32} />
                                    <span>AtomeFacile</span>
                                </div>
                                <div className="flex bg-slate-800 rounded-xl p-1 border border-slate-700">
                                    <button 
                                        onClick={() => setActiveTab('concept')}
                                        className={`flex items-center gap-2 px-6 py-2 rounded-lg font-bold transition-all ${activeTab === 'concept' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        <Icon name="target" size={18} /> Images
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('formules')}
                                        className={`flex items-center gap-2 px-6 py-2 rounded-lg font-bold transition-all ${activeTab === 'formules' ? 'bg-amber-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        <Icon name="book-open" size={18} /> Formules
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="p-4 md:p-8 max-w-6xl mx-auto">
                        {activeTab === 'concept' ? (
                            <div className="space-y-12">
                                <header className="text-center space-y-4 mb-16">
                                    <h1 className="text-4xl md:text-6xl font-extrabold text-slate-900 tracking-tight">L'Atome, sans prise de tête.</h1>
                                    <p className="text-xl text-slate-500">Découvrons ensemble comment fonctionne un atome d'hydrogène.</p>
                                </header>

                                {/* ETAPE 1 */}
                                <section className="bg-white rounded-3xl shadow-sm border p-8 flex flex-col md:flex-row gap-12 items-center">
                                    <div className="flex-1 space-y-6">
                                        <div className="inline-flex items-center gap-3 text-blue-600 font-bold bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                                            <Icon name="target" size={20} /> Étape 1 : Le système solaire miniature
                                        </div>
                                        <h2 className="text-3xl font-bold">Un Soleil et une Planète</h2>
                                        <p className="text-lg text-slate-600 leading-relaxed">
                                            L'atome d'hydrogène ressemble à notre système solaire. Le noyau (+) attire l'électron (-), mais sa vitesse l'empêche de s'écraser.
                                        </p>
                                    </div>
                                    <div className="flex-1 flex justify-center">
                                        <div className="relative w-64 h-64 bg-slate-900 rounded-full shadow-inner border-4 border-slate-800 flex items-center justify-center overflow-hidden">
                                            <div className="absolute w-8 h-8 bg-red-500 rounded-full shadow-[0_0_20px_red] z-10"></div>
                                            <div className="absolute w-48 h-48 border border-slate-600 rounded-full border-dashed animate-[spin_10s_linear_infinite]"></div>
                                            <div className="absolute w-full h-full animate-[spin_3s_linear_infinite]">
                                                <div className="absolute top-8 left-1/2 -ml-3 w-6 h-6 bg-blue-400 rounded-full shadow-[0_0_15px_#60a5fa]"></div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* ETAPE 2 & 3 */}
                                <section className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                                    <div className="bg-gradient-to-r from-amber-500 to-orange-500 p-6 text-white flex items-center gap-3">
                                        <Icon name="zap" size={28} />
                                        <h2 className="text-2xl font-bold">L'Embouteillage des Couches (K, L, M...)</h2>
                                    </div>
                                    <div className="p-8 grid lg:grid-cols-2 gap-12 items-center">
                                        <div className="space-y-6">
                                            <p className="text-lg text-slate-700">Plus tu montes vers la liberté (0 eV), plus les marches deviennent petites et serrées.</p>
                                            <div className="bg-slate-50 p-6 rounded-2xl border text-center space-y-4">
                                                <div className="text-3xl font-extrabold text-amber-600">N = {conceptLevel}</div>
                                                <div className="text-lg font-mono bg-white px-4 py-2 rounded-lg border">
                                                    Énergie : {(-13.6 / (conceptLevel * conceptLevel)).toFixed(3)} eV
                                                </div>
                                                <div className="flex gap-2 justify-center">
                                                    <button onClick={() => setConceptLevel(Math.max(1, conceptLevel - 1))} className="px-4 py-2 bg-slate-200 rounded-lg font-bold">Descendre</button>
                                                    <button onClick={() => setConceptLevel(Math.min(20, conceptLevel + 1))} className="px-4 py-2 bg-amber-500 text-white rounded-lg font-bold">Propulser 🚀</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-900 rounded-3xl p-6 h-[400px] relative flex justify-center border-4 border-slate-800">
                                            <svg width="100%" height="100%" viewBox="0 0 300 400">
                                                <line x1="20" y1="50" x2="280" y2="50" stroke="#34d399" strokeWidth="2" strokeDasharray="5,5" />
                                                {[1, 2, 3, 4, 5, 10, 20].map(n => {
                                                    const y = 50 + ((-13.6 / (n * n)) / -13.6) * 300;
                                                    return <line key={n} x1="50" y1={y} x2="250" y2={y} stroke={n === conceptLevel ? "#f59e0b" : "#475569"} strokeWidth={n === conceptLevel ? 3 : 1} />
                                                })}
                                                <circle cx="150" cy={50 + ((-13.6 / (conceptLevel * conceptLevel)) / -13.6) * 300} r="10" fill="#3b82f6" stroke="#fff" />
                                            </svg>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="space-y-12">
                                <header className="text-center space-y-4 mb-12">
                                    <h1 className="text-4xl md:text-5xl font-extrabold text-amber-700">Laboratoire des Formules</h1>
                                </header>

                                {/* LABO 1 : EQUILIBRE */}
                                <div className="bg-white border rounded-3xl overflow-hidden shadow-sm">
                                    <div className="bg-slate-800 p-6 text-white flex items-center justify-between">
                                        <h2 className="text-2xl font-bold flex items-center gap-3"><Icon name="scale" size={28} className="text-blue-400" /> L'Équilibre Parfait</h2>
                                    </div>
                                    <div className="p-8 grid lg:grid-cols-2 gap-12">
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-2xl border text-center text-xl font-bold">
                                                <span className="text-red-600">Aimant</span> = <span className="text-blue-600">Vitesse</span>
                                            </div>
                                            <p className="text-slate-600">Si la vitesse n'est pas parfaite, l'électron s'écrase ou s'enfuit !</p>
                                        </div>
                                        <div className="bg-slate-900 rounded-3xl p-6 text-white space-y-6 border-4 border-slate-800">
                                            <div className="h-32 bg-black rounded-xl relative flex items-center justify-center overflow-hidden border border-slate-700">
                                                <div className="w-6 h-6 bg-red-500 rounded-full"></div>
                                                <div className="absolute w-24 h-24 border border-dashed border-slate-700 rounded-full"></div>
                                                <div className="absolute w-full h-full" style={{ 
                                                    animation: `spin ${speedF1 > 0 ? 100/speedF1 : 0}s linear infinite`,
                                                    transform: `scale(${speedF1 < 45 ? 0.2 : speedF1 > 55 ? 3 : 1})`,
                                                    transition: 'transform 1s ease'
                                                }}>
                                                    <div className="absolute top-4 left-1/2 w-4 h-4 bg-blue-400 rounded-full"></div>
                                                </div>
                                            </div>
                                            <input type="range" min="0" max="100" value={speedF1} onChange={e => setSpeedF1(parseInt(e.target.value))} className="w-full h-2 bg-slate-700 rounded-lg appearance-none accent-blue-500" />
                                            <div className="text-center font-bold">
                                                {getOrbitStatus() === 'stable' ? '✅ Stable' : '⚠️ Instable'}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* LABO 2 : RAYON */}
                                <div className="bg-white border rounded-3xl overflow-hidden shadow-sm">
                                    <div className="bg-emerald-800 p-6 text-white flex items-center justify-between">
                                        <h2 className="text-2xl font-bold flex items-center gap-3"><Icon name="maximize-2" size={28} className="text-emerald-400" /> Taille de l'Orbite</h2>
                                    </div>
                                    <div className="p-8 grid lg:grid-cols-2 gap-12 items-center">
                                        <div className="space-y-6">
                                            <div className="bg-emerald-50 p-6 rounded-2xl border text-center text-2xl font-bold text-emerald-900">
                                                Rayon = N² × 0.0529 nm
                                            </div>
                                            <input type="range" min="1" max="4" value={radiusN} onChange={e => setRadiusN(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none accent-emerald-600" />
                                            <div className="text-center font-bold text-emerald-700">Distance : {(radiusN * radiusN * 0.0529).toFixed(3)} nm</div>
                                        </div>
                                        <div className="bg-slate-900 rounded-3xl p-6 h-64 relative flex items-center justify-center border-4 border-slate-800">
                                            <div className="w-4 h-4 bg-red-500 rounded-full"></div>
                                            <div className="absolute border-2 border-emerald-500 rounded-full transition-all duration-500" style={{ width: radiusN * radiusN * 30, height: radiusN * radiusN * 30 }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
